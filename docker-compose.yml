version: '3.8'

services:
  # ---- 基础设施 ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - ./chroma_db:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: deepseek_chat_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ---- 应用服务 ----
  fastapi:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env                     # 加载 .env 中的所有变量
    environment:
      - HF_HUB_OFFLINE=1                # 强制离线，不尝试连接 huggingface
      - HF_ENDPOINT=https://hf-mirror.com  # 备用镜像（离线时不会用到）
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=mysql+aiomysql://root:123456@mysql:3306/deepseek_chat_db
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - redis
      - chroma
      - mysql
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - C:/Users/admin/.cache/huggingface/hub:/root/.cache/huggingface/hub

  celery-worker:
    build: .
    command: celery -A celery_worker worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      - HF_HUB_OFFLINE=1
      - HF_ENDPOINT=https://hf-mirror.com
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=mysql+aiomysql://root:123456@mysql:3306/deepseek_chat_db
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - redis
      - chroma
      - mysql
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - C:/Users/admin/.cache/huggingface/hub:/root/.cache/huggingface/hub

volumes:
  mysql_data: