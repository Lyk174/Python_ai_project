<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级 LLM 对话终端</title>
    <!-- 引入 marked.js 用于解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f6f8;
            --chat-bg: #ffffff;
            --user-msg-bg: #d1e7dd; /* 绿色气泡 */
            --ai-msg-bg: #e9ecef; /* 灰色气泡 */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            padding: 15px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 消息气泡样式 */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 2px;
        }

        .message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #333;
        }

        /* 输入区域样式 */
        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: #f9f9f9;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Markdown 代码块样式微调 */
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">DeepSeek 智能助手</div>

    <div id="chat-box">
        <!-- 欢迎语 -->
        <div class="message ai">
            <strong>🤖 AI 助手</strong>
            你好！我是基于 FastAPI 和 DeepSeek 驱动的 AI 助手。请问有什么可以帮你的吗？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." value="">
        <button id="send-btn" onclick="sendChat()">发送</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 支持回车发送
    userInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendChat();
        }
    });

    async function sendChat() {
        const message = userInput.value.trim();
        if (!message) return;

        // 1. UI 状态更新
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        sendBtn.innerText = '思考中...';

        // 2. 显示用户消息
        appendMessage('user', '👤 我', message);

        // 3. 创建 AI 消息容器
        const aiMessageDiv = appendMessage('ai', '🤖 AI', '<span style="color:#999">正在输入...</span>');
        let fullContent = ''; // 用于累积完整文本

        try {
            // 4. 发起流式请求
            const response = await fetch('/api/v1/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    history: [], // 如果有历史记录，可以在这里传入
                    stream: true
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            // 5. 处理流式数据
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');

                // 保留最后一行（可能是不完整的）
                buffer = lines.pop();

                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (trimmedLine.startsWith('data:')) {
                        const dataStr = trimmedLine.slice(5).trim();

                        // 检查结束标记
                        if (dataStr === '[DONE]') {
                            break;
                        }

                        // 解析 JSON 数据
                        try {
                            const json = JSON.parse(dataStr);
                            if (json.content) {
                                fullContent += json.content;
                                // 实时渲染 Markdown
                                aiMessageDiv.innerHTML = marked.parse(fullContent);
                                // 滚动到底部
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        } catch (e) {
                            console.error('JSON 解析错误:', e);
                            // 如果是系统错误字符串，直接显示
                            if (dataStr.startsWith('[')) {
                                aiMessageDiv.innerHTML += `<br><span style="color:red">${dataStr}</span>`;
                            }
                        }
                    }
                }
            }
        } catch (err) {
            console.error('请求失败:', err);
            aiMessageDiv.innerHTML = `<span style="color:red">出错了: ${err.message}</span>`;
        } finally {
            // 6. 恢复 UI 状态
            userInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.innerText = '发送';
            userInput.focus();
        }
    }

    // 辅助函数：添加消息到界面
    function appendMessage(type, label, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.innerHTML = `<strong>${label}</strong>${content}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv; // 返回元素引用，以便后续更新内容
    }
</script>

</body>
</html>
